services:

  redis:
    image: redis:7-alpine
    container_name: design_squad_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  orchestrator:
    build: .
    container_name: design_squad_core
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis      # имя сервиса выше; переопределяется в .env для локального запуска
    extra_hosts:
      - "host.docker.internal:host-gateway"   # доступ к хосту (для локальных LLM)
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
